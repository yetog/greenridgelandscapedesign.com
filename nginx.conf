# Redirect www to non-www
server {
    listen 80;
    server_name www.greenempireland.com;
    return 301 $scheme://greenempireland.com$request_uri;
}

server {
    listen 80;
    server_name greenempireland.com;
    root /usr/share/nginx/html;
    index index.html;

    # Clean URLs — try file, then directory index, then 404
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Cache static assets aggressively
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Block source files from being served
    location ~ \.(py|sh|md)$ {
        return 404;
    }
}
